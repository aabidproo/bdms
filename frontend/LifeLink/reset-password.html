<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LifeLink</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- External Auth Styles -->
    <link rel="stylesheet" href="auth.css">
</head>
<body class="antialiased flex flex-col min-h-screen">
    <!-- Updated Navbar to match index.html exactly -->
    <nav class="navbar-custom sticky top-0 z-50 py-3 px-6 md:px-12 shadow-md flex justify-between items-center w-full">
        <a href="index.html" class="flex items-center gap-3 transition hover:text-white/90">
            <img src="../photos/January is National Blood Donor Month - Blood Donations Needed!.jfif" alt="LifeLink Logo" class="h-8 w-8 object-cover bg-[#b11e28]">
            <span class="text-xl font-extrabold text-white tracking-tight">LifeLink</span>
        </a>
        <a href="index.html" class="btn-header-pill transition-all active:scale-95">Back to Login</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 bg-gray-900/5 backdrop-blur-sm relative overflow-hidden">
        <!-- Subtle Background Decorations matching index aesthetics -->
        <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-indigo-100/30 rounded-full blur-3xl -translate-y-1/2 translate-x-1/4 -z-10"></div>
        <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-rose-100/30 rounded-full blur-3xl translate-y-1/2 -translate-x-1/4 -z-10"></div>

        <!-- Auth Card with Border Radius matching index.html -->
        <div class="auth-card w-full max-w-md p-8 md:p-10 shadow-2xl relative z-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gray-50 text-indigo-600 mb-5 shadow-sm border border-gray-100">
                    <i class="fas fa-user-shield text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">Secure Your Account</h1>
                <p class="text-gray-500 mt-2 text-sm font-medium">Create a new, strong password to regain access to your dashboard.</p>
            </div>

            <div id="missing-token-msg" class="hidden p-5 rounded-2xl bg-rose-50 text-rose-700 mb-8 border border-rose-100 text-sm font-bold flex items-center gap-3 transition-all">
                <i class="fas fa-exclamation-triangle text-lg"></i>
                Reset link is invalid or expired.
            </div>

            <form id="reset-password-form" class="space-y-6">
                <div>
                    <label for="new-password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">New Password</label>
                    <div class="relative">
                        <input type="password" id="new-password" name="new-password" placeholder="••••••••" required 
                            class="auth-input w-full px-4 py-3.5 focus:outline-none transition-all text-gray-900 text-sm font-medium">
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Confirm New Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required 
                            class="auth-input w-full px-4 py-3.5 focus:outline-none transition-all text-gray-900 text-sm font-medium">
                    </div>
                </div>

                <div id="message-area" class="hidden p-4 rounded-xl text-sm font-medium"></div>

                <button type="submit" id="submit-btn" class="btn-indigo w-full py-4 font-bold flex justify-center items-center gap-2 text-base active:scale-[0.98]">
                    <span class="btn-text">Reset Password <i class="fas fa-check-circle ml-1"></i></span>
                    <div class="spinner"></div>
                </button>

                <div class="text-center pt-6 mt-4 border-t border-gray-100">
                    <a href="index.html" class="text-login-link text-sm uppercase tracking-wide">
                        Return to Login
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-white py-8 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-400 font-medium tracking-wide">&copy; 2026 LifeLink Blood Donation Platform. All rights reserved.</p>
    </footer>

    <script src="reset-password.js"></script>
</body>
</html>
